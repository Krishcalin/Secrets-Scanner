# Secret signature rule pack.
#
# Each rule:
#   id          unique rule id (also used in the fingerprint)
#   description human-readable label
#   regex       Python regex matched against full file content
#   severity    info | low | medium | high | critical
#   capture     (optional) group index of the secret value; 0 = whole match
#   min_entropy (optional) skip the match unless the captured value's Shannon
#               entropy is >= this — gates noisy/generic patterns
#   verifier    (optional) hint for Phase 5 live verification (e.g. aws_sts)
#
# Add rules here — no code change required.
patterns:
  # ── AWS ────────────────────────────────────────────────────────────────
  - id: aws_access_key_id
    description: AWS Access Key ID
    regex: "(?:AKIA|ASIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA)[0-9A-Z]{16}"
    severity: critical
    verifier: aws_sts

  - id: aws_secret_access_key
    description: AWS Secret Access Key
    regex: "(?i)aws_secret_access_key\\s*[=:]\\s*['\"]?([A-Za-z0-9/+=]{40})['\"]?"
    severity: critical
    capture: 1
    verifier: aws_sts

  # ── Google Cloud ───────────────────────────────────────────────────────
  - id: gcp_api_key
    description: Google API Key
    regex: "AIza[0-9A-Za-z_\\-]{35}"
    severity: high

  - id: gcp_service_account
    description: GCP service account key marker
    regex: "\"type\"\\s*:\\s*\"service_account\""
    severity: high

  - id: gcp_oauth_client_secret
    description: Google OAuth client secret
    regex: "GOCSPX-[0-9A-Za-z_\\-]{28}"
    severity: high

  # ── GitHub / GitLab ──────────────────────────────────────────────────────
  - id: github_pat
    description: GitHub Personal Access Token (classic)
    regex: "ghp_[0-9A-Za-z]{36}"
    severity: critical
    verifier: github_user

  - id: github_fine_grained_pat
    description: GitHub fine-grained PAT
    regex: "github_pat_[0-9A-Za-z_]{22,}"
    severity: critical
    verifier: github_user

  - id: github_oauth_token
    description: GitHub OAuth/app/refresh/server token
    regex: "gh[ousr]_[0-9A-Za-z]{36}"
    severity: critical
    verifier: github_user

  - id: gitlab_pat
    description: GitLab Personal Access Token
    regex: "glpat-[0-9A-Za-z_\\-]{20}"
    severity: critical

  # ── LLM / AI providers ───────────────────────────────────────────────────
  - id: openai_api_key
    description: OpenAI API key
    regex: "sk-(?!ant-)(?:proj-|svcacct-|admin-)?[A-Za-z0-9_\\-]{20,}"
    severity: critical
    min_entropy: 3.5
    verifier: openai

  - id: anthropic_api_key
    description: Anthropic API key
    regex: "sk-ant-[0-9A-Za-z]{2,}-[0-9A-Za-z_\\-]{80,}"
    severity: critical
    verifier: anthropic

  # ── SaaS providers ───────────────────────────────────────────────────────
  - id: slack_token
    description: Slack token
    regex: "xox[baprs]-[0-9A-Za-z-]{10,}"
    severity: high
    verifier: slack_auth

  - id: slack_webhook
    description: Slack incoming webhook URL
    regex: "https://hooks\\.slack\\.com/services/T[0-9A-Za-z_]+/B[0-9A-Za-z_]+/[0-9A-Za-z_]+"
    severity: high

  - id: stripe_secret_key
    description: Stripe secret key
    regex: "sk_live_[0-9A-Za-z]{24,}"
    severity: critical
    verifier: stripe

  - id: sendgrid_api_key
    description: SendGrid API key
    regex: "SG\\.[A-Za-z0-9_\\-]{22}\\.[A-Za-z0-9_\\-]{43}"
    severity: critical
    verifier: sendgrid

  - id: twilio_api_key
    description: Twilio API Key SID
    regex: "SK[0-9a-fA-F]{32}"
    severity: high
    verifier: twilio

  - id: mailgun_api_key
    description: Mailgun API key
    regex: "key-[0-9a-zA-Z]{32}"
    severity: high

  - id: telegram_bot_token
    description: Telegram bot token
    regex: "[0-9]{8,10}:AA[0-9A-Za-z_\\-]{33}"
    severity: high

  - id: shopify_token
    description: Shopify access token
    regex: "shp(?:at|ca|pa|ss)_[a-fA-F0-9]{32}"
    severity: critical

  - id: digitalocean_pat
    description: DigitalOcean personal access token
    regex: "dop_v1_[a-f0-9]{64}"
    severity: critical

  # ── Package registries ─────────────────────────────────────────────────
  - id: npm_token
    description: npm access token
    regex: "npm_[0-9A-Za-z]{36}"
    severity: critical

  - id: pypi_token
    description: PyPI upload token
    regex: "pypi-[A-Za-z0-9_\\-]{50,}"
    severity: critical

  # ── Azure ────────────────────────────────────────────────────────────────
  - id: azure_storage_key
    description: Azure Storage account key (connection string)
    regex: "(?i)AccountKey=([A-Za-z0-9+/=]{86,})"
    severity: critical
    capture: 1

  # ── Keys, tokens, URIs ───────────────────────────────────────────────────
  - id: private_key_block
    description: Private key (PEM) block
    regex: "-----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----"
    severity: critical

  - id: jwt
    description: JSON Web Token
    regex: "eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}"
    severity: medium

  - id: db_connection_uri
    description: Database connection URI with inline credentials
    regex: "(?i)(?:postgres|postgresql|mysql|mongodb(?:\\+srv)?|redis|amqp)://[^:@/\\s]+:[^@/\\s]+@[^\\s'\"]+"
    severity: high

  - id: private_key_assignment
    description: Private key assigned to a variable
    regex: "(?i)private[_-]?key\\s*[=:]"
    severity: medium

  - id: generic_api_key_assignment
    description: Generic API key/secret assignment
    regex: "(?i)(?:api[_-]?key|secret|token|passwd|password)\\s*[=:]\\s*['\"]([^'\"\\s]{12,})['\"]"
    severity: medium
    capture: 1
    min_entropy: 2.5

# ── Allowlist ───────────────────────────────────────────────────────────────
# Values/paths matching these are NOT reported (documentation samples, template
# placeholders, obvious fixtures). Matched case-insensitively. Tune freely.
allowlist:
  value_patterns:
    - "example"                  # AWS AKIAIOSFODNN7EXAMPLE et al.
    - "changeme"
    - "placeholder"
    - "redacted"
    - "dummy"
    - "your[_-]?(?:api[_-]?)?(?:key|token|secret|password)"
    - "my[_-]?secret"
    - "insert[_-].*here"
    - "<[^>]+>"                  # <your-api-key>
    - "\\$\\{[^}]+\\}"           # ${SECRET}
    - "\\{\\{[^}]+\\}\\}"        # {{ token }}
    - "^x{6,}$"                  # XXXXXXXX
    - "^(?:abc123|test123|password123|secret123|foobar|sample)$"
  path_patterns: []              # opt-in; suppressing whole paths can hide leaks
