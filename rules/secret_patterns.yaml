# Secret signature rule pack.
# Each rule: id, description, regex, severity, optional capture (group index of
# the secret value; default 0 = whole match). Add rules here — no code change.
patterns:
  - id: aws_access_key_id
    description: AWS Access Key ID
    regex: "(?:AKIA|ASIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA)[0-9A-Z]{16}"
    severity: critical

  - id: aws_secret_access_key
    description: AWS Secret Access Key
    regex: "(?i)aws_secret_access_key\\s*[=:]\\s*['\"]?([A-Za-z0-9/+=]{40})['\"]?"
    severity: critical
    capture: 1

  - id: gcp_api_key
    description: Google API Key
    regex: "AIza[0-9A-Za-z_\\-]{35}"
    severity: high

  - id: gcp_service_account
    description: GCP service account private key marker
    regex: "\"type\"\\s*:\\s*\"service_account\""
    severity: high

  - id: github_pat
    description: GitHub Personal Access Token
    regex: "ghp_[0-9A-Za-z]{36}"
    severity: critical

  - id: github_fine_grained_pat
    description: GitHub fine-grained PAT
    regex: "github_pat_[0-9A-Za-z_]{22,}"
    severity: critical

  - id: slack_token
    description: Slack token
    regex: "xox[baprs]-[0-9A-Za-z-]{10,}"
    severity: high

  - id: stripe_secret_key
    description: Stripe secret key
    regex: "sk_live_[0-9A-Za-z]{24,}"
    severity: critical

  - id: private_key_block
    description: Private key (PEM) block
    regex: "-----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----"
    severity: critical

  - id: jwt
    description: JSON Web Token
    regex: "eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}"
    severity: medium

  - id: slack_webhook
    description: Slack incoming webhook URL
    regex: "https://hooks\\.slack\\.com/services/T[0-9A-Za-z_]+/B[0-9A-Za-z_]+/[0-9A-Za-z_]+"
    severity: high

  - id: generic_api_key_assignment
    description: Generic API key/secret assignment
    regex: "(?i)(?:api[_-]?key|secret|token|passwd|password)\\s*[=:]\\s*['\"]([^'\"\\s]{12,})['\"]"
    severity: medium
    capture: 1

  - id: db_connection_uri
    description: Database connection URI with inline credentials
    regex: "(?i)(?:postgres|postgresql|mysql|mongodb(?:\\+srv)?|redis|amqp)://[^:@/\\s]+:[^@/\\s]+@[^\\s'\"]+"
    severity: high

  - id: private_key_assignment
    description: Private key assigned to a variable
    regex: "(?i)private[_-]?key\\s*[=:]"
    severity: medium
